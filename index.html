<!DOCTYPE html>
<html lang="en">

<head>
	<title>personality quiz</title>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<!-- import the webpage's stylesheet -->
	<link rel="stylesheet" href="/style.css">

	<!-- import the webpage's javascript file -->
	<script src="/script.js" defer>

	</script>
</head>

<body>

	<header>
		<h1>Find out your mbti!</h1>
		<p></p>
	</header>

	<main>

		<h2>It’s finally the weekend. What are your plans?</h2>
		<div class="question">

			<div class="answer-choice">
				<img src="assets/bedroom.jpg" alt="bedroom">
        <br>
        <button id="q1a1">Stay home and spend some time working on your hobbies by yourself</button>
      		</div>

      <div class="answer-choice">
        <img src="assets/outing.jpg" alt="Brunch with friends">
        <br>
        <button id="q1a2">Go on an outing with a big group of friends</button>
      </div>

    </div> 
    
    <h2>While eating lunch, you…</h2>
    <div class="question">

      <div class="answer-choice">
        <img src="assets/clouds.jpg" alt="clouds">
        <br>
        <button id="q2a1">Get lost in thought, daydreaming about an interesting concept or about future plans </button>
      </div>

      <div class="answer-choice">
        <img src="assets/surroundings.jpg" alt="grassy field">
        <br>
        <button id="q2a2">Like to notice details about your surroundings</button>
      </div>

    </div> 
    
    <h2>A friend comes to you for advice. You…</h2>
    <div class="question">

      <div class="answer-choice">
        <img src="assets/logic.jpg" alt="Piet Mondrian’s Composition in Red, Yellow, Blue and Black">
        <br>
        <button id="q3a1">Try to analyze the problem logically</button>
      </div>

      <div class="answer-choice">
        <img src="assets/emotions.jpg" alt="rainbow aura">
        <br>
        <button id="q3a2">Focus on comforting your friend’s feelings first</button>
      </div>

    </div> 

    <h2>Your daily routines are…</h2>
    <div class="question">

      <div class="answer-choice">
        <img src="assets/calendar.jpg" alt="monthly calendars">
        <br>
        <button id="q4a1">Structured, with a schedule perfected from years of repetition</button>
      </div>

      <div class="answer-choice">
        <img src="assets/river.jpg" alt="river in a forest">
        <br>
        <button id="q4a2">Spontaneous, depending on what tasks you feel like doing that day</button>
      </div>

    </div> 

    <button id = "showans">What's my mbti?</button>
    
    <h2 id="result">Your mbti is...</h2>

    <button id="restart">Restart</button>
    
  </main>
  </body>
</html>
